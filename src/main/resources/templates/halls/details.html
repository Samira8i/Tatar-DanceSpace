<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="section">
    <div class="container">
        <div class="hall-detail-container">
            <div class="card">
                <div class="card-image hall-detail-image">
                    <div th:if="${hall.imageUrl}" th:style="'background-image: url(' + ${hall.imageUrl} + ');'"></div>
                    <div th:unless="${hall.imageUrl}" class="hall-detail-placeholder">🏛️</div>
                </div>
                <div class="card-content">
                    <h1 th:text="${hall.name}">Название зала</h1>

                    <div class="hall-info-block">
                        <p><strong>Адрес:</strong> <span th:text="${hall.address}"></span></p>
                        <p><strong>Цена:</strong> <span th:text="${hall.price} + ' ₽/час'"></span></p>
                        <p><strong>Владелец:</strong> <span th:text="${hall.owner.username}"></span></p>
                        <p><strong>Статус:</strong>
                            <span th:if="${hall.status.name() == 'APPROVED'}" class="status-approved">Одобрен</span>
                            <span th:if="${hall.status.name() == 'PENDING'}" class="status-pending">На модерации</span>
                        </p>
                        <p><strong>Добавлен:</strong> <span th:text="${#temporals.format(hall.createdAt, 'dd.MM.yyyy')}"></span></p>
                    </div>

                    <h3>Описание</h3>
                    <p th:text="${hall.description}">Описание зала</p>

                    <div class="hall-stats-bar">
                        <div>⭐ Рейтинг: <span class="avg-rating">0</span> / 5</div>
                        <div>Отзывов: <span class="reviews-count">0</span></div>
                    </div>

                    <div id="reviews-section">
                        <h3>Отзывы (<span class="reviews-count-display">0</span>)</h3>
                        <div id="reviews-list">
                            <div th:each="review : ${reviews}" class="review" th:data-review-id="${review.id}">
                                <div class="review-header">
                                    <div>
                                        <strong th:text="${review.user.username}"></strong>
                                        <span class="stars">
                                            <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
                                            <span th:each="i : ${#numbers.sequence(1, 5 - review.rating)}">☆</span>
                                        </span>
                                    </div>
                                    <div>
                                        <span class="review-date" th:text="${#temporals.format(review.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                                        <button class="delete-review-btn"
                                                th:data-review-id="${review.id}"
                                                th:if="${#authorization.expression('isAuthenticated()') and (review.user.username == #authentication.name or #authorization.expression('hasRole(''ADMIN'')'))}">
                                            Удалить
                                        </button>
                                    </div>
                                </div>
                                <p th:text="${review.text}"></p>
                            </div>
                        </div>

                        <div th:if="${#authorization.expression('isAuthenticated()') and not hasReviewed}" class="add-review-form">
                            <select id="review-rating" class="form-control">
                                <option value="5">★★★★★ (5)</option>
                                <option value="4">★★★★☆ (4)</option>
                                <option value="3">★★★☆☆ (3)</option>
                                <option value="2">★★☆☆☆ (2)</option>
                                <option value="1">★☆☆☆☆ (1)</option>
                            </select>
                            <textarea id="review-text" class="form-control" rows="3" placeholder="Ваш отзыв (необязательно)..."></textarea>
                            <button id="submit-review" class="btn btn-primary">Отправить отзыв</button>
                        </div>
                        <div th:if="${hasReviewed}" class="already-reviewed">Вы уже оставили отзыв на этот зал</div>
                        <div th:unless="${#authorization.expression('isAuthenticated()')}" class="login-prompt">
                            <a th:href="@{/login}">Войдите</a>, чтобы оставить отзыв
                        </div>
                    </div>

                    <div class="hall-actions-footer">
                        <a th:href="@{/halls}" class="btn btn-outline">Назад</a>
                        <div th:if="${#authorization.expression('isAuthenticated()') and (isOwner or isAdmin)}" class="hall-edit-actions">
                            <a th:href="@{/halls/{id}/edit(id=${hall.id})}" class="btn btn-primary">Редактировать</a>
                            <form th:action="@{/halls/{id}/delete(id=${hall.id})}" method="post">
                                <button type="submit" class="btn btn-outline btn-danger" onclick="return confirm('Удалить этот зал?')">Удалить</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:inline="javascript">
    window.hallId = /*[[${hall.id}]]*/ null;
</script>
<script th:src="@{/js/halls-detail.js}"></script>

</body>
</html>
