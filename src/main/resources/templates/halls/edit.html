<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="section">
    <div class="container">
        <div style="max-width: 600px; margin: 0 auto;">
            <div class="card">
                <div class="card-content">
                    <h2 class="card-title">Редактирование зала</h2>

                    <form th:action="@{/halls/{id}/edit(id=${hall.id})}" th:object="${hallRequest}" method="post">
                        <div class="form-group">
                            <label class="form-label">Название *</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Адрес *</label>
                            <input type="text" th:field="*{address}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Цена за час (₽) *</label>
                            <input type="number" step="100" th:field="*{price}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Описание</label>
                            <textarea th:field="*{description}" class="form-control" rows="5" placeholder="Подробное описание зала..."></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Ссылка на изображение</label>
                            <input type="url" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
                        </div>

                        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                            <a th:href="@{/halls/{id}(id=${hall.id})}" class="btn btn-outline">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
