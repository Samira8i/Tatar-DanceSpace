<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="section">
    <div class="container">
        <div style="max-width: 600px; margin: 0 auto;">
            <h2 class="section-title">Добавить танцевальный зал</h2>

            <form th:action="@{/halls/add}" th:object="${hallRequest}" method="post">
                <div class="form-group">
                    <label class="form-label">Название зала</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Например: Dance Studio" required>
                    <div class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Адрес</label>
                    <input type="text" th:field="*{address}" class="form-control" placeholder="Город, улица, дом" required>
                    <div class="error-message" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Цена (₽/час)</label>
                    <input type="number" step="100" th:field="*{price}" class="form-control" placeholder="1000" required>
                    <div class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea th:field="*{description}" class="form-control" rows="5" placeholder="Опишите ваш зал..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Ссылка на фото (необязательно)</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="@{/halls}" class="btn btn-outline">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
