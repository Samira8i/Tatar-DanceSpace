<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-header">
        <h1>Вход в аккаунт</h1>
        <p class="subtitle">Добро пожаловать обратно</p>
    </div>

    <div th:if="${param.error}" class="auth-error">
        Неверный email или пароль
    </div>

    <div th:if="${param.logout}" class="auth-error">
        Вы вышли из системы
    </div>

    <div th:if="${param.registered}" class="auth-success">
        Регистрация успешна! Войдите в аккаунт.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" placeholder="••••••" required>
        </div>

        <button type="submit" class="auth-button">Войти</button>
    </form>

    <div class="auth-links">
        Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
    </div>

    <div class="auth-divider">
        <span>или</span>
    </div>

    <a th:href="@{/oauth2/authorization/yandex}" class="social-button" style="text-decoration: none; display: inline-block; text-align: center;">
        Войти через Яндекс
    </a>
</div>
</body>
</html>
