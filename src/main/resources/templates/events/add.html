<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="section">
    <div class="container">
        <div style="max-width: 600px; margin: 0 auto;">
            <h2 class="section-title">Создать событие</h2>

            <div th:if="${error}" class="auth-error" th:text="${error}"></div>

            <form th:action="@{/events/add}" th:object="${eventRequest}" method="post">
                <div class="form-group">
                    <label class="form-label">Название *</label>
                    <input type="text" th:field="*{title}" class="form-control" placeholder="Мастер-класс по хип-хопу" required>
                    <div class="error-message" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Дата и время *</label>
                    <input type="datetime-local" th:field="*{dateTime}" class="form-control" required>
                    <div class="error-message" th:if="${#fields.hasErrors('dateTime')}" th:errors="*{dateTime}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Стиль танца</label>
                    <input type="text" th:field="*{style}" class="form-control" placeholder="Hip-Hop, Contemporary, Jazz...">
                </div>

                <div class="form-group">
                    <label class="form-label">Место проведения</label>
                    <input type="text" th:field="*{place}" class="form-control" placeholder="Казань, ул. Баумана, 10">
                </div>

                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea th:field="*{description}" class="form-control" rows="5" placeholder="Расскажите о событии..."></textarea>
                    <div class="error-message" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Ссылка на фото</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://example.com/photo.jpg">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">Создать событие</button>
                    <a th:href="@{/events}" class="btn btn-outline">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
