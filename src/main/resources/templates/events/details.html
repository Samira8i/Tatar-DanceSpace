<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/header :: head}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="section">
    <div class="container">
        <div class="event-detail-container">
            <div class="card">
                <div class="card-image event-detail-image">
                    <div th:if="${event.imageUrl}" th:style="'background-image: url(' + ${event.imageUrl} + ');'"></div>
                    <div th:unless="${event.imageUrl}" class="event-detail-placeholder">🎭</div>
                </div>
                <div class="card-content">
                    <h1 th:text="${event.title}">Название</h1>

                    <div class="event-info-block">
                        <p><strong>Дата:</strong> <span th:text="${#temporals.format(event.dateTime, 'dd.MM.yyyy HH:mm')}"></span></p>
                        <p><strong>Место:</strong> <span th:text="${event.place}"></span></p>
                        <p><strong>Стиль:</strong> <span th:text="${event.style}"></span></p>
                        <p><strong>Организатор:</strong> <span th:text="${event.organizer.username}"></span></p>
                        <p><strong>Статус:</strong>
                            <span th:if="${event.status.name() == 'APPROVED'}" class="status-approved">Одобрено</span>
                            <span th:if="${event.status.name() == 'PENDING'}" class="status-pending">На модерации</span>
                        </p>
                    </div>

                    <h3>Описание</h3>
                    <p th:text="${event.description}">Описание события</p>

                    <div class="event-actions-bar">
                        <button class="like-btn" th:data-event-id="${event.id}">
                            <span class="like-icon">❤️</span>
                            <span class="like-count" th:text="${event.likes.size()}">0</span>
                        </button>
                        <button class="favorite-btn" th:data-event-id="${event.id}">
                            <span class="favorite-icon">⭐</span>
                            <span class="favorite-count" th:text="${event.favoritedByUsers.size()}">0</span>
                        </button>
                        <div class="comments-count">
                            💬 <span class="comment-count" th:text="${event.comments.size()}">0</span>
                        </div>
                    </div>

                    <div id="comments-section">
                        <h3>Комментарии (<span class="comment-count-display" th:text="${event.comments.size()}">0</span>)</h3>
                        <div id="comments-list">
                            <div th:each="comment : ${event.comments}" class="comment" th:data-comment-id="${comment.id}">
                                <div class="comment-header">
                                    <div>
                                        <strong th:text="${comment.user.username}"></strong>
                                        <span class="comment-date" th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                                    </div>
                                    <button class="delete-comment-btn"
                                            th:data-comment-id="${comment.id}"
                                            th:if="${#authorization.expression('isAuthenticated()') and (comment.user.username == #authentication.name or #authorization.expression('hasRole(''ADMIN'')'))}">
                                        Удалить
                                    </button>
                                </div>
                                <p th:text="${comment.text}"></p>
                            </div>
                        </div>

                        <div th:if="${#authorization.expression('isAuthenticated()')}" class="add-comment-form">
                            <textarea id="comment-text" class="form-control" rows="3" placeholder="Напишите комментарий..."></textarea>
                            <button id="submit-comment" class="btn btn-primary">Отправить</button>
                        </div>
                        <div th:unless="${#authorization.expression('isAuthenticated()')}" class="login-prompt">
                            <a th:href="@{/login}">Войдите</a>, чтобы оставить комментарий
                        </div>
                    </div>

                    <div class="event-actions-footer">
                        <a th:href="@{/events}" class="btn btn-outline">Назад</a>
                        <div th:if="${#authorization.expression('isAuthenticated()') and (isOwner or isAdmin)}" class="event-edit-actions">
                            <a th:href="@{/events/{id}/edit(id=${event.id})}" class="btn btn-primary">Редактировать</a>
                            <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post">
                                <button type="submit" class="btn btn-outline btn-danger" onclick="return confirm('Удалить это событие?')">Удалить</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:inline="javascript">
    window.eventId = /*[[${event.id}]]*/ null;
</script>
<script th:src="@{/js/events-detail.js}"></script>

</body>
</html>
