databaseChangeLog:
  - changeSet:
      id: 005-create-likes-table
      author: tatardancespace
      changes:
        - createTable:
            tableName: likes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: event_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            constraintName: fk_like_user
            baseTableName: likes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_like_event
            baseTableName: likes
            baseColumnNames: event_id
            referencedTableName: events
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            constraintName: unique_user_event_like
            tableName: likes
            columnNames: user_id, event_id