databaseChangeLog:
  - changeSet:
      id: 003-create-events-table
      author: tatardancespace
      changes:
        - createTable:
            tableName: events
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: date_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: style
                  type: VARCHAR(100)
              - column:
                  name: place
                  type: VARCHAR(512)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: image_url
                  type: VARCHAR(512)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false
              - column:
                  name: organizer_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            constraintName: fk_event_organizer
            baseTableName: events
            baseColumnNames: organizer_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE